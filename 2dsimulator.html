const STAIR_EQ=3.5, PAUSE_T=1.6, STAIR_T=2.2, WALK_V=1.3;

function buildTimeline14(sc){
  const segs=[]; let t=0, dist=0, stairs=0;
  const legs=SC14[sc].legs;
  legs.forEach((leg,li)=>{
    for(let i=0;i<leg.pts.length;i++){
      const p=leg.pts[i];
      if(p[2]!==undefined){ segs.push({kind:'pause',f:leg.f,x:p[0],y:p[1],note:p[2],t0:t,t1:t+PAUSE_T}); t+=PAUSE_T; }
      if(i<leg.pts.length-1){
        const q=leg.pts[i+1];
        const d=Math.hypot(q[0]-p[0],q[1]-p[1]);
        segs.push({kind:'walk',f:leg.f,x1:p[0],y1:p[1],x2:q[0],y2:q[1],t0:t,t1:t+d/WALK_V});
        t+=d/WALK_V; dist+=d;
      }
    }
    if(li<legs.length-1){
      const up=legs[li+1].f>leg.f;
      const a=leg.pts[leg.pts.length-1], b=legs[li+1].pts[0];
      segs.push({kind:'stair',f1:leg.f,f2:legs[li+1].f,x1:a[0],y1:a[1],x2:b[0],y2:b[1],up,t0:t,t1:t+STAIR_T});
      t+=STAIR_T; dist+=STAIR_EQ; stairs++;
    }
  });
  return {segs,T:t,dist,stairs};
}

/* ---- 太陽位置(東京 35.7°N, 平均太陽時≒JST) ---- */
function sunPos14(n,t){
  const r=Math.PI/180, lat=35.71*r;
  const dec=23.44*r*Math.sin(2*Math.PI*(284+n)/365);
  const h=(t-12)*15*r;
  const alt=Math.asin(Math.sin(lat)*Math.sin(dec)+Math.cos(lat)*Math.cos(dec)*Math.cos(h));
  const azS=Math.atan2(Math.sin(h)*Math.cos(dec), Math.cos(h)*Math.cos(dec)*Math.sin(lat)-Math.sin(dec)*Math.cos(lat)); // 南基準+西
  return {alt, bearing:Math.PI+azS}; // 北基準時計回り
}
function updateSun14(){
  const t=+$('hh14').value;
  $('hh14V').textContent=`${Math.floor(t)}:${t%1?'30':'00'}`;
  const G=$('sun14'), CAP=$('suncap14');
  if(se14==='off'){G.innerHTML='';CAP.textContent='';return;}
  const {alt,bearing}=sunPos14(+se14,t);
  if(alt<=0.01){G.innerHTML='';CAP.textContent='☾ この時刻、太陽は地平線の下です';return;}
  // 太陽へ向かう水平単位ベクトル(グリッド座標)
  const S=[N14[0]*Math.cos(bearing)+E14[0]*Math.sin(bearing), N14[1]*Math.cos(bearing)+E14[1]*Math.sin(bearing)];
  const L=[-S[0],-S[1]];                                   // 光の進行方向
  const depth=Math.min(4.2, Math.max(0.35, 1.9/Math.tan(alt)));
  let out=''; const lit=new Set();
  WIN14.forEach(w=>{
    const[f,x1,y1,x2,y2,nx,ny,maxD,room]=w;
    const inc=S[0]*nx+S[1]*ny;                             // 面への日射角係数
    if(inc<=0.05) return;
    const d=Math.min(depth,maxD);
    const A=px14(f,x1,y1), B=px14(f,x2,y2);
    const C=px14(f,x2+L[0]*d,y2+L[1]*d), D=px14(f,x1+L[0]*d,y1+L[1]*d);
    out+=`<polygon points="${A} ${B} ${C} ${D}" fill="#E8B93C" opacity="${(0.13+0.24*inc).toFixed(2)}"/>`;
    lit.add(room);
  });
  // 太陽アイコン(各プラン中心から方位方向へ)
  [1,2].forEach(f=>{
    const c=[4.2,4.2];
    let sx=c[0]+S[0]*6.6, sy=c[1]+S[1]*6.6;
    sx=Math.min(9.6,Math.max(-1.2,sx)); sy=Math.min(10.4,Math.max(-1.6,sy));
    const[px,py]=px14(f,sx,sy), [qx,qy]=px14(f,c[0]+S[0]*3.4,c[1]+S[1]*3.4);
    out+=`<line x1="${px}" y1="${py}" x2="${qx}" y2="${qy}" stroke="#E8B93C" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.8"/>
      <circle cx="${px}" cy="${py}" r="9" fill="#E8B93C"/>`;
    for(let k=0;k<8;k++){const a=k*Math.PI/4; out+=`<line x1="${px+12*Math.cos(a)}" y1="${py+12*Math.sin(a)}" x2="${px+16*Math.cos(a)}" y2="${py+16*Math.sin(a)}" stroke="#E8B93C" stroke-width="1.6"/>`;}
  });
  G.innerHTML=out;
  const seas={355:'冬至',81:'春秋分',172:'夏至'}[se14];
  const bd=(bearing*180/Math.PI)%360;
  const dir=['北','北東','東','南東','南','南西','西','北西','北'][Math.round(bd/45)];
  CAP.textContent=`☀ ${seas} ${$('hh14V').textContent} — 方位 ${dir}(${bd.toFixed(0)}°) / 高度 ${(alt*180/Math.PI).toFixed(0)}° / 直射: ${lit.size?[...lit].join('・'):'なし'} / 差込深さ ≈ ${Math.min(4.2,1.9/Math.tan(alt)).toFixed(1)} m`;
}

  $('step14V').textContent=`${fmt(dist/0.65,0)} 歩`;
  $('stair14V').textContent=stairs?`${stairs} 回`:'なし(同一階)';
  $('time14V').textContent=`約${fmt(dist/WALK_V+stairs*8,0)} 秒`;
  $('n14V').textContent=`${n} 回/日`;
  $('year14V').textContent=`${fmt(dist*n*365/1000,1)} km/年`;
  const b=$('badge14');
  const load=stairs*n;
  if(sc14===2){b.className='badge dry';b.textContent='ドラム乾燥+洗面隣接WICで洗濯が1F完結 — 干す・運ぶ・階段が消えた動線';}
  else if(sc14===5){b.className='badge edge';b.textContent=`【添い寝Ver.】階段${stairs}回/朝(うち抱っこ2回)+主寝室ピックアップはWIC⇄洗面経由の遠回り — こども部屋Ver.と比べてみてください`;}
  else if(sc14===8){const d5=buildTimeline14(5).dist-tl14.dist;b.className='badge dry';b.textContent=`【こども部屋Ver.】洋室4.7帖(ホール直結)起点で添い寝Ver.より約${fmt(d5,0)}m/朝 短縮 — 着替え・おむつが部屋で完結し、WIC経由の往復が消える。階段${stairs}回は同じ`;}
  else if(sc14===6){b.className='badge dry';b.textContent='深夜帰宅(ご飯なし)は1F完結 — 2Fの寝静まった生活空間を通らずシャワー→就寝できる';}
  else if(sc14===7){b.className='badge edge';b.textContent=`階段${stairs}回+深夜の2Fキッチン — レンジ・食器の音と照明(深夜調光)の対策を設計時に仕込む価値あり`;}
  else if(load===0){b.className='badge dry';b.textContent='階段を跨がない動線 — この間取りの快適ゾーン';}
  else if(load<=2){b.className='badge dry';b.textContent=`階段${load}回/日 — 2階リビングの標準的な負担`;}
  else if(load<=6){b.className='badge edge';b.textContent=`階段${load}回/日 — 荷物の有無で体感が変わる領域`;}
  else{b.className='badge wet';b.textContent=`階段${load}回/日 — 動線側の設計(収納位置・干し場)で減らす価値あり`;}
}

function setScenario14(i){
  sc14=i; stop14();
  tl14=buildTimeline14(i);
  $('trailA14').setAttribute('points',''); $('trailB14').setAttribute('points','');
  $('walker14').style.display='none'; $('note14').style.display='none';
  drawRoute14(); stats14();
}
function stop14(){ playing14=false; if(anim14)cancelAnimationFrame(anim14); $('play14').textContent='▶ 再生'; }

function play14(){
  if(playing14){ stop14(); return; }
  playing14=true; $('play14').textContent='❚❚ 停止';
  $('trailA14').setAttribute('points',''); $('trailB14').setAttribute('points','');
  const trails={1:[],2:[]};
  const W=$('walker14'), NT=$('note14'), pulse=$('pulse14');
  W.style.display='';
  let start=null;
  const step=ts=>{
    if(!playing14)return;
    if(start===null)start=ts;
    const t=(ts-start)/1000*sp14;
    const {segs,T}=tl14;
    if(t>=T+0.8){ stop14(); return; }
    const tc=Math.min(t,T-0.001);
    const s=segs.find(sg=>tc>=sg.t0&&tc<sg.t1)||segs[segs.length-1];
    let f,x,y,note=null;
    if(s.kind==='walk'){ const k=(tc-s.t0)/(s.t1-s.t0); f=s.f; x=s.x1+(s.x2-s.x1)*k; y=s.y1+(s.y2-s.y1)*k; }
    else if(s.kind==='pause'){ f=s.f; x=s.x; y=s.y; note=s.note; }
    else { const k=(tc-s.t0)/(s.t1-s.t0); if(k<0.5){f=s.f1;x=s.x1;y=s.y1;}else{f=s.f2;x=s.x2;y=s.y2;} note=s.up?'階段を上る…':'階段を下りる…'; }
    const[cx,cy]=px14(f,x,y);
    W.setAttribute('transform',`translate(${cx},${cy})`);
    pulse.setAttribute('r',9+3*Math.sin(ts/180));
    if(s.kind==='walk'){
      const arr=trails[f];
      if(!arr.length||Math.hypot(arr[arr.length-1][0]-cx,arr[arr.length-1][1]-cy)>2)arr.push([cx,cy]);
      $(f===1?'trailA14':'trailB14').setAttribute('points',arr.map(p=>p.join(',')).join(' '));
    }
    if(note){
      NT.style.display='';
      const tx=NT.querySelector('text'), rc=NT.querySelector('rect');
      tx.textContent=note;
      const w=note.length*10.5+16;
      const nx=Math.min(Math.max(cx,60+w/2-60),720-w/2-4);
      tx.setAttribute('x',nx); tx.setAttribute('y',cy-20);
      rc.setAttribute('x',nx-w/2); rc.setAttribute('y',cy-33); rc.setAttribute('width',w); rc.setAttribute('height',18);
    } else NT.style.display='none';
    anim14=requestAnimationFrame(step);
  };
  anim14=requestAnimationFrame(step);
}



seg('sc14Seg','sc',v=>setScenario14(+v));
seg('sp14Seg','sp',v=>{sp14=+v;});
$('play14').addEventListener('click',play14);
$('n14').addEventListener('input',stats14);
seg('se14Seg','se',v=>{se14=v;updateSun14();});
$('hh14').addEventListener('input',updateSun14);

drawPlan14();setScenario14(0);updateSun14();

</script>
