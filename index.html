<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>住宅設計ビジュアライザ｜南荻窪の家</title>
<style>
  :root {
    --bg: #f6f5f2;
    --card-bg: #ffffff;
    --text: #1f2933;
    --muted: #6b7280;
    --accent: #2563eb;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
    --shadow-hover: 0 4px 8px rgba(0,0,0,.08), 0 12px 28px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111418;
      --card-bg: #1b2027;
      --text: #e7eaee;
      --muted: #9aa3af;
      --accent: #60a5fa;
      --border: #2a313b;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --shadow-hover: 0 6px 20px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
    line-height: 1.6;
  }
  .container { max-width: 880px; margin: 0 auto; }
  header { margin-bottom: 36px; }
  h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: .02em; }
  header p { color: var(--muted); margin-top: 6px; font-size: .95rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }
  .card .icon { font-size: 1.8rem; }
  .card h2 { font-size: 1.05rem; font-weight: 700; }
  .card p { font-size: .85rem; color: var(--muted); flex-grow: 1; }
  .card .open {
    font-size: .82rem;
    color: var(--accent);
    font-weight: 600;
  }
  footer {
    margin-top: 48px;
    text-align: center;
    font-size: .8rem;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>住宅設計ビジュアライザ</h1>
      <p>南荻窪の家 — 打ち合わせ・検討用ツール集</p>
    </header>

    <main class="grid">
      <a class="card" href="2dsimulator.html">
        <span class="icon">🚶</span>
        <h2>動線シミュレータ（2D）</h2>
        <p>間取り図の上で1日の生活動線を歩いてみるシミュレータ。平面ビューで動線を確認できます。</p>
        <span class="open">開く →</span>
      </a>

      <a class="card" href="3dsimulator.html">
        <span class="icon">🏠</span>
        <h2>動線シミュレータ（3D）</h2>
        <p>3Dビューでも動線を確認できる拡張版シミュレータ。</p>
        <span class="open">開く →</span>
      </a>

      <a class="card" href="insulation.html">
        <span class="icon">🌡️</span>
        <h2>住宅設計シミュレータ（断熱）</h2>
        <p>断熱・住宅性能に関する打ち合わせ用14点セット。仕様検討の判断材料に。</p>
        <span class="open">開く →</span>
      </a>

      <a class="card" href="rack.html">
        <span class="icon">🔌</span>
        <h2>情報配線 図面集</h2>
        <p>LAN・情報配線ラックの図面集。配線ルートと機器配置の確認用。</p>
        <span class="open">開く →</span>
      </a>
    </main>

    <footer>GitHub Pages で公開中</footer>
  </div>
</body>
</html>
